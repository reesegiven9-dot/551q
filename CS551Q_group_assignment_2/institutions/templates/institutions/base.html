{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institution Dashboard</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <nav class="site-nav">
            <strong class="site-logo">LOGO</strong>
            <div class="nav-links" aria-label="Primary navigation">
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'institution_list' %}">Institutions</a>
                <a href="{% url 'compare_institutions' %}">Compare</a>
                <a href="{% url 'top_institutions' %}">Top</a>
            </div>
            <div class="auth-links" aria-label="Account actions">
                <a class="auth-button login-button" href="{% url 'login' %}">Login</a>
                <a class="auth-button register-button" href="{% url 'register' %}">Register</a>
            </div>
        </nav>
    </header>

    <main class="container">

        {% if messages %}
            {% for message in messages %}
                <p class="{{ message.tags }}">{{ message }}</p>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock content %}
    </main>

    <footer>
        <p>Project Info | <a href="#" style="color: white;">GitHub</a> | Credits</p>
    </footer>
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
